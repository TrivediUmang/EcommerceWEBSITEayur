{% extends 'base.html' %}
{% load static %}

{% block title %}Add Address | VedaRoots{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/address.css' %}">
{% endblock %}

{% block content %}

<section class="address-form-page">

    <div class="form-container">

        <h1>📍 Add New Address</h1>

        <p>Add your delivery address for faster checkout.</p>

        <form method="POST">

            {% csrf_token %}

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="full_name" required>
            </div>

            <div class="form-group">
                <label>Mobile Number</label>
                <input type="text" name="phone" required>
            </div>

            <div class="form-group">
                <label>House / Flat No.</label>
                <input type="text" name="house" required>
            </div>

            <div class="form-group">
                <label>Area / Street</label>
                <input type="text" name="area" required>
            </div>

            <div class="form-group">
                <label>City</label>
                <input type="text" name="city" required>
            </div>

            <div class="form-group">
                <label>State</label>
                <input type="text" name="state" required>
            </div>

            <div class="form-group">
                <label>Pincode</label>
                <input type="text" name="pincode" required>
            </div>

            <button type="submit" class="save-btn">
                Save Address
            </button>

        </form>

    </div>

</section>

{% endblock %}
